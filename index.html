<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR проект</title>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #e9eef5;
      font-family: Arial, sans-serif;
    }

    model-viewer {
      width: 100%;
      height: 100vh;
      background: linear-gradient(#f4f7fb, #dfe7f1);
    }

    #ar-button {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 24px;
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      background: #111;
      color: #fff;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <model-viewer
    src="./mycrate.glb"
    ios-src="./mycrate.usdc"
    alt="3D модель"
    ar
    ar-modes="quick-look webxr scene-viewer"
    camera-controls
    auto-rotate
    environment-image="neutral"
    exposure="1.1"
    shadow-intensity="1">

    <button slot="ar-button" id="ar-button">
      Открыть в AR
    </button>

  </model-viewer>

</body>
</html>
