<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR проект</title>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #e9eef5;
      font-family: Arial, sans-serif;
    }
    #msg {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(255,255,255,.92);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
    }
    model-viewer {
      width: 100%;
      height: 100vh;
      background: linear-gradient(#f4f7fb, #dfe7f1);
    }
  </style>
</head>
<body>
  <div id="msg">Загрузка...</div>

  <model-viewer
    id="mv"
    src="./mycrate.glb"
    alt="3D модель"
    camera-controls
    auto-rotate
    ar
    ar-modes="webxr scene-viewer quick-look"
    environment-image="neutral"
    exposure="1.1"
    shadow-intensity="1">
  </model-viewer>

  <script>
    const mv = document.getElementById('mv');
    const msg = document.getElementById('msg');

    customElements.whenDefined('model-viewer')
      .then(() => { msg.textContent = 'model-viewer загружен'; })
      .catch(() => { msg.textContent = 'Ошибка загрузки библиотеки'; });

    mv.addEventListener('load', () => {
      msg.textContent = 'Модель загружена';
    });

    mv.addEventListener('error', () => {
      msg.textContent = 'Ошибка загрузки модели';
    });
  </script>
</body>
</html>
